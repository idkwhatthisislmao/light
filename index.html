
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    /* COUNTDOWN */
    #countdown {
        font-size: 40px;
        color: black;
        background: white;
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* MAIN */
    #main {
        display: none;
        width: 100%;
        height: 100%;
        justify-content: center;
        align-items: center;
        animation: bgRainbow 3s infinite linear;
    }

    @keyframes bgRainbow {
        0% { background-color: red; }
        16% { background-color: orange; }
        33% { background-color: yellow; }
        50% { background-color: green; }
        66% { background-color: blue; }
        83% { background-color: indigo; }
        100% { background-color: violet; }
    }

    /* SHAKE WRAPPER */
    #shake {
        display: flex;
        animation: shake 0.4s infinite;
    }

    /* BEAT SHAKE */
    @keyframes shake {
        0%   { transform: translate(0px, 0px); }
        10%  { transform: translate(-5px, 3px); }
        20%  { transform: translate(5px, -3px); }
        30%  { transform: translate(-6px, 2px); }
        40%  { transform: translate(6px, -2px); }
        50%  { transform: translate(-8px, 4px); } /* strongest hit */
        60%  { transform: translate(6px, -3px); }
        70%  { transform: translate(-4px, 2px); }
        80%  { transform: translate(3px, -1px); }
        90%  { transform: translate(-2px, 1px); }
        100% { transform: translate(0px, 0px); }
    }

    #ip {
        display: flex;
        font-size: 90px;
        font-weight: bold;
        animation: zoom 2s infinite ease-in-out, spin 6s infinite linear;
    }

    @keyframes zoom {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.25); }
    }

    @keyframes spin {
        0%, 85%, 100% { transform: rotate(0deg); }
        90% { transform: rotate(360deg); }
    }

    .char {
        display: inline-block;
        animation: wave 1.2s infinite ease-in-out,
                   rainbowText 2s infinite linear;
        -webkit-text-stroke: 2px black;
        text-shadow: 0 0 10px black, 0 0 20px black;
    }

    @keyframes wave {
        0%, 100% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(-25px) scale(1.4); }
    }

    @keyframes rainbowText {
        0% { color: red; }
        20% { color: orange; }
        40% { color: yellow; }
        60% { color: lime; }
        80% { color: cyan; }
        100% { color: magenta; }
    }
</style>
</head>

<body>

<div id="countdown">5</div>

<div id="main">
    <div id="shake">
        <div id="ip">LOADING...</div>
    </div>
</div>

<audio id="music" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let timeLeft = 5;
const countdownEl = document.getElementById("countdown");

const timer = setInterval(() => {
    timeLeft--;
    countdownEl.innerText = timeLeft;

    if (timeLeft <= 0) {
        clearInterval(timer);

        countdownEl.style.display = "none";
        const main = document.getElementById("main");
        main.style.display = "flex";

        fetch("https://api.ipify.org?format=json")
        .then(res => res.json())
        .then(data => {
            const ip = data.ip;
            const container = document.getElementById("ip");
            container.innerHTML = "";

            ip.split("").forEach((char, i) => {
                const span = document.createElement("span");
                span.className = "char";
                span.style.animationDelay = (i * 0.08) + "s";
                span.innerText = char;
                container.appendChild(span);
            });
        });
    }
}, 1000);

/* autoplay fix */
document.body.addEventListener("click", () => {
    document.getElementById("music").play();
});
</script>

</body>
</html>

<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <title>Kitchen Light</title> <style> body { margin: 0; font-family: Arial, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background: #f4f4f4; } /* FAKE BUTTON SCREEN */ #ui { display: flex; justify-content: center; align-items: center; } #btn { padding: 20px 40px; font-size: 24px; border: none; border-radius: 12px; background: #222; color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); } #btn:hover { transform: scale(1.1); } /* MAIN CHAOS */ #main { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; animation: bgRainbow 3s infinite linear; position: absolute; top: 0; left: 0; } @keyframes bgRainbow { 0% { background-color: red; } 16% { background-color: orange; } 33% { background-color: yellow; } 50% { background-color: green; } 66% { background-color: blue; } 83% { background-color: indigo; } 100% { background-color: violet; } } /* SHAKE */ #shake { display: flex; animation: shake 0.4s infinite; } @keyframes shake { 0% { transform: translate(0px, 0px); } 20% { transform: translate(-6px, 3px); } 40% { transform: translate(6px, -3px); } 60% { transform: translate(-8px, 4px); } 80% { transform: translate(6px, -2px); } 100% { transform: translate(0px, 0px); } } #ip { display: flex; font-size: 90px; font-weight: bold; animation: zoom 2s infinite ease-in-out, spin 6s infinite linear; } @keyframes zoom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } } @keyframes spin { 0%, 85%, 100% { transform: rotate(0deg); } 90% { transform: rotate(360deg); } } .char { display: inline-block; animation: wave 1.2s infinite ease-in-out, rainbowText 2s infinite linear; -webkit-text-stroke: 2px black; text-shadow: 0 0 10px black, 0 0 20px black; } @keyframes wave { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-25px) scale(1.4); } } @keyframes rainbowText { 0% { color: red; } 20% { color: orange; } 40% { color: yellow; } 60% { color: lime; } 80% { color: cyan; } 100% { color: magenta; } } </style> </head> <body> <div id="ui"> <button id="btn">Kitchen Light</button> </div> <div id="main"> <div id="shake"> <div id="ip">LOADING...</div> </div> </div> <audio id="music" loop> <source src="music.mp3" type="audio/mpeg"> </audio> <script> document.getElementById("btn").onclick = () => { document.getElementById("ui").style.display = "none"; const main = document.getElementById("main"); main.style.display = "flex"; const music = document.getElementById("music"); music.play(); fetch("https://api.ipify.org?format=json") .then(res => res.json()) .then(data => { const ip = data.ip; const container = document.getElementById("ip"); container.innerHTML = ""; ip.split("").forEach((char, i) => { const span = document.createElement("span"); span.className = "char"; span.style.animationDelay = (i * 0.08) + "s"; span.innerText = char; container.appendChild(span); }); }); }; </script> </body> </html>
